<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <!-- "Juris" text in dark teal -->
  <text x="0" y="58" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-style="italic" font-weight="700" fill="#2a5a6e">Juris</text>
  <!-- Circle with column -->
  <circle cx="168" cy="38" r="26" fill="#9ca3af" opacity="0.9"/>
  <!-- Classical column/pillar -->
  <g transform="translate(154, 14)" fill="#f5f5f5">
    <!-- Column capital -->
    <rect x="4" y="6" width="20" height="3" rx="1"/>
    <rect x="6" y="3" width="16" height="4" rx="1"/>
    <!-- Column shaft with fluting -->
    <rect x="8" y="9" width="2.5" height="32"/>
    <rect x="12" y="9" width="2.5" height="32"/>
    <rect x="16" y="9" width="2.5" height="32"/>
    <!-- Column base -->
    <rect x="6" y="41" width="16" height="3" rx="1"/>
    <rect x="4" y="44" width="20" height="3" rx="1"/>
  </g>
  <!-- "Ai" text in gold -->
  <text x="198" y="58" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-style="italic" font-weight="700" fill="#d4a84b">Ai</text>
</svg>
